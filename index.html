
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>Pomodoro Timer</title>
</head>
<body>
  <div class="header">
    <div class="auth-links">
      <a id="loginLink" href="login.html">LOGIN</a>
      <a id="signupLink" href="signup.html">SIGN UP</a>
      <button id="logoutBtn" class="auth-action" type="button" hidden>LOGOUT</button>
      <button id="settingsBtn" class="auth-action" type="button">SETTINGS</button>
      <button id="themeToggle" class="theme-toggle" type="button" aria-label="Switch to dark mode" aria-pressed="false">
        <span class="theme-option theme-option-light" aria-hidden="true">☼</span>
        <span class="theme-option theme-option-dark" aria-hidden="true">☾</span>
        <span class="theme-thumb" aria-hidden="true"></span>
      </button>
    </div>
  </div>

  <div class="container">
    <div class="timer">
      <p id="sessionDisplay">25:00</p>
      <p id="status">WORK TIME</p>
      <div class="controls">
        <button id="startStopBtn">START</button>
        <button id="resetBtn">RESET</button>
        <button id="analyticsBtn">VIEW ANALYTICS</button>
      </div>
    </div>
    
    <div class="project">
      <h2>Tasks</h2>
      <div class="task-entry">
      <input type="text" id="projectInput" placeholder="Enter a task...">
      <button id="addProjectBtn">ADD TASK</button>
      </div>
      <ul id="projectList"></ul>
    </div>
    </div>

  <div id="analyticsSection" style="display: none;">
    <div id="analyticsData"></div>
    <button id="backBtn" class="back-button">BACK</button>
  </div>

  <div id="settingsDialog" class="modal-backdrop" hidden>
    <form id="settingsPanel" class="settings-modal" role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
      <div class="modal-header">
        <h2 id="settingsTitle">Timer Settings</h2>
        <button id="closeSettingsBtn" class="modal-close" type="button" aria-label="Close settings">×</button>
      </div>
      <label>
        <span>Work time</span>
        <div class="settings-input-row">
          <input id="workMinutesInput" type="number" min="1" max="180" step="1" required>
          <span>mins</span>
        </div>
      </label>
      <label>
        <span>Break time</span>
        <div class="settings-input-row">
          <input id="breakMinutesInput" type="number" min="1" max="60" step="1" required>
          <span>mins</span>
        </div>
      </label>
      <div class="modal-actions">
        <button id="cancelSettingsBtn" type="button">CANCEL</button>
        <button type="submit">SAVE</button>
      </div>
    </form>
  </div>

  <div id="sessionDialog" class="modal-backdrop" hidden>
    <div class="session-modal" role="dialog" aria-modal="true" aria-labelledby="sessionDialogTitle">
      <p id="sessionDialogKicker">Session update</p>
      <h2 id="sessionDialogTitle">Start your break?</h2>
      <p id="sessionDialogMessage">Work session complete.</p>
      <button id="sessionDialogBtn" type="button">START BREAK</button>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="script.js"></script>
    
</body>
</html>
